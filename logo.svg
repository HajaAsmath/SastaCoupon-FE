<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SastaCoupon logo mark">
  <defs>
    <linearGradient id="scBrand" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="scPct" x1="170" y1="170" x2="342" y2="342" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- rounded badge background with brand gradient -->
  <rect x="32" y="32" width="448" height="448" rx="116" fill="url(#scBrand)"/>

  <!-- coupon ticket -->
  <g>
    <path d="M150 168
             h212 a26 26 0 0 1 26 26 v34
             a30 30 0 0 0 0 60 v34
             a26 26 0 0 1 -26 26 h-212
             a26 26 0 0 1 -26 -26 v-34
             a30 30 0 0 0 0 -60 v-34
             a26 26 0 0 1 26 -26 z"
          fill="#FFFFFF"/>
    <!-- perforation divider -->
    <line x1="318" y1="178" x2="318" y2="344" stroke="#DDD6FE" stroke-width="9" stroke-linecap="round" stroke-dasharray="2 24"/>
  </g>

  <!-- percent symbol -->
  <g fill="url(#scPct)">
    <circle cx="206" cy="220" r="26"/>
    <circle cx="266" cy="300" r="26"/>
    <rect x="221" y="178" width="34" height="170" rx="17" transform="rotate(34 238 263)"/>
  </g>

  <!-- accent sparkle -->
  <path d="M360 150 l10 26 26 10 -26 10 -10 26 -10 -26 -26 -10 26 -10 z" fill="#F472B6"/>
</svg>
